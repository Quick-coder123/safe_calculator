<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Анкета клієнта - Калькулятор оренди сейфу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <nav>
      <a href="index.html" class="nav-link">Калькулятор</a>
      <a href="clients.html" class="nav-link">Клієнти</a>
      <a href="add-client.html" class="nav-link">Додати клієнта</a>
    </nav>
    
    <!-- Секція термінових сейфів -->
    <div class="expiring-safes-section">
      <h3 class="expiring-title">Термінові сейфи</h3>
      <div id="expiring-safes-list" class="expiring-list">
        <!-- Список буде заповнюватися JavaScript -->
      </div>
    </div>
  </div>
  <div class="main-content">
    <header class="header">
      <button id="theme-toggle" class="btn-icon" aria-label="Перемикач теми">🌙</button>
      <select id="lang-select" class="select-small">
        <option value="uk">UA</option>
      <option value="en">EN</option>
    </select>
  </header>

  <main class="layout" style="grid-template-columns: 1fr; grid-template-areas: 'form'; max-width: 800px; margin: 0 auto;">
    <section class="panel form-panel" style="grid-area: form;">
      <div class="button-row" style="align-items:center;margin-bottom:16px;gap:12px;">
        <h1 style="margin:0; font-family:'Inter',sans-serif; font-weight:600; color:var(--accent); flex:1;">Анкета клієнта</h1>
        <button id="edit-client-btn" type="button" class="action-btn secondary" style="flex:none;">Редагувати анкету</button>
      </div>
      
      <form id="client-form" class="client-info-boxes"></form>
      
      <div id="safes-section" class="client-safes-boxes"></div>
      
      <div class="button-row" style="margin-top:16px;">
        <a href="clients.html" class="action-btn secondary">Назад до списку</a>
      </div>
    </section>
  </main>

  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
    });
  </script>
  <script src="expiring-safes.js"></script>
  <script src="client.js"></script>
  </div>
</body>
</html>
