<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Анкета клієнта - Калькулятор оренди сейфу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <nav>
      <a href="index.html" class="nav-link">Калькулятор</a>
      <a href="clients.html" class="nav-link">Клієнти</a>
      <a href="add-client.html" class="nav-link">Додати клієнта</a>
    </nav>
    
    <!-- Секція термінових сейфів -->
    <div class="expiring-safes-section">
      <h3 class="expiring-title">Термінові сейфи</h3>
      <div id="expiring-safes-list" class="expiring-list">
        <!-- Список буде заповнюватися JavaScript -->
      </div>
    </div>
  </div>
  <div class="main-content">
    <header class="header">
      <button id="theme-toggle" class="btn-icon" aria-label="Перемикач теми">🌙</button>
      <select id="lang-select" class="select-small">
        <option value="uk">UA</option>
      <option value="en">EN</option>
    </select>
  </header>

  <main class="main-content">
    <div class="client-profile">
      <div class="profile-header">
        <div class="profile-avatar">
          <span class="avatar-icon">👤</span>
        </div>
        <div class="profile-info">
          <h1 id="client-name-display">Завантаження...</h1>
          <p id="client-contact-display">📧 📱</p>
        </div>
        <div class="profile-actions">
          <button class="action-btn primary" id="edit-client-btn">✏️ Редагувати</button>
          <button class="action-btn secondary" onclick="deleteClient()">🗑️ Видалити</button>
          <a href="clients.html" class="action-btn secondary">⬅️ Назад до списку</a>
        </div>
      </div>
    </div>

    <div class="form-container" id="edit-form-container" style="display: none;">
      <div class="form-header">
        <h2>✏️ Редагування клієнта</h2>
        <div class="form-progress">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
          <span class="progress-text">Крок 1 з 1</span>
        </div>
      </div>
      
      <form id="client-form" class="enhanced-form">
        <!-- Форма буде заповнена JavaScript -->
      </form>
    </div>

    <div class="safes-section">
      <div class="table-container">
        <div class="table-header">
          <div class="table-title">
            <h2>🏦 Сейфи клієнта</h2>
            <span class="table-count" id="safes-count">0 сейфів</span>
          </div>
          <button class="action-btn primary" onclick="addSafe()">➕ Додати сейф</button>
        </div>
        
        <div class="table-wrapper">
          <table id="safes-table">
            <thead>
              <tr>
                <th>🔢 Номер</th>
                <th>📐 Розмір</th>
                <th> До</th>
                <th>📊 Статус</th>
                <th>⚙️ Дії</th>
              </tr>
            </thead>
            <tbody id="safes-list">
              <tr class="loading-row">
                <td colspan="5">
                  <div class="loading-state">
                    <div class="spinner"></div>
                    <span>Завантаження сейфів...</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
    });
  </script>
  <script src="expiring-safes.js"></script>
  <script src="client.js"></script>
  </div>
</body>
</html>
