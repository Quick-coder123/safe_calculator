<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Клієнти сейфів - Калькулятор оренди сейфу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <nav>
      <a href="index.html" class="nav-link">Калькулятор</a>
      <a href="clients.html" class="nav-link">Клієнти</a>
      <a href="add-client.html" class="nav-link">Додати клієнта</a>
    </nav>
    
    <!-- Секція термінових сейфів -->
    <div class="expiring-safes-section">
      <h3 class="expiring-title">Термінові сейфи</h3>
      <div id="expiring-safes-list" class="expiring-list">
        <!-- Список буде заповнюватися JavaScript -->
      </div>
    </div>
  </div>
  
  <div class="main-content">
    <header class="header">
      <button id="theme-toggle" class="btn-icon" aria-label="Перемикач теми">🌙</button>
      <select id="lang-select" class="select-small">
        <option value="uk">UA</option>
        <option value="en">EN</option>
    </select>
  </header>
  
  <main class="layout" style="grid-template-columns: 1fr; grid-template-areas: 'form'; max-width: 1000px; margin: 0 auto;">
    <section class="panel form-panel" style="grid-area: form;">
      <h1 style="font-family:'Inter',sans-serif; font-weight:600; color:var(--accent); margin-bottom:16px;">Діючі клієнти</h1>
      
      <div class="form-group" style="max-width: 400px; margin-bottom: 20px;">
        <input type="text" id="client-search" placeholder="Пошук по ПІБ..." style="width:100%;">
      </div>
       <div class="clients-table-container" style="overflow-x:auto;">
        <table id="clients-table" class="clients-table" style="width:100%;">
          <thead>
            <tr>
              <th>ПІБ</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      
      <button id="export-btn" class="action-btn secondary" style="margin-top:16px;">Експортувати в Excel</button>
    </section>
  </main>

  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
    });
  </script>
  <script src="expiring-safes.js"></script>
  <script src="clients.js"></script>
  </div>
</body>
</html>
