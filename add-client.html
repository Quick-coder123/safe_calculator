<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Додати клієнта - Калькулятор оренди сейфу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <nav>
      <a href="index.html" class="nav-link">Калькулятор</a>
      <a href="clients.html" class="nav-link">Клієнти</a>
      <a href="add-client.html" class="nav-link">Додати клієнта</a>
    </nav>
    
    <!-- Секція термінових сейфів -->
    <div class="expiring-safes-section">
      <h3 class="expiring-title">Термінові сейфи</h3>
      <div id="expiring-safes-list" class="expiring-list">
        <!-- Список буде заповнюватися JavaScript -->
      </div>
    </div>
  </div>
  <div class="main-content">
    <header class="header">
      <button id="theme-toggle" class="btn-icon" aria-label="Перемикач теми">🌙</button>
      <select id="lang-select" class="select-small">
        <option value="uk">UA</option>
      <option value="en">EN</option>
    </select>
  </header>

  <main class="layout" style="grid-template-columns: 1fr; grid-template-areas: 'form'; max-width: 900px; margin: 0 auto;">
    <div class="form-container">
      <h1 class="form-title">➕ Додати нового клієнта</h1>
      
      <div class="form-progress">
        <div class="form-progress-bar" id="progress-bar"></div>
      </div>
      
      <form id="client-form">
        <div class="form-row">
          <div class="form-group required">
            <label for="client-name">ПІБ клієнта</label>
            <input type="text" id="client-name" name="name" placeholder="Введіть повне ім'я" required>
            <small class="form-hint">Прізвище Ім'я По батькові</small>
          </div>
          
          <div class="form-group required">
            <label for="client-ipn">ІПН</label>
            <input type="text" id="client-ipn" name="ipn" placeholder="1234567890" maxlength="10" required>
            <small class="form-hint">10 цифр індивідуального податкового номера</small>
          </div>
        </div>
        
        <div id="safes-list" style="margin: 20px 0;"></div>
        
        <button type="button" id="add-safe-btn" class="action-btn secondary" style="margin-bottom:16px;">
          Додати сейф
        </button>
        
        <div class="form-group">
          <label for="client-iban">IBAN <span class="info-icon" title="Міжнародний номер банківського рахунку">ℹ️</span></label>
          <input type="text" id="client-iban" name="iban" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="client-email">📧 Email</label>
            <input type="email" id="client-email" name="email" placeholder="client@example.com">
            <small class="form-hint">Електронна адреса для зв'язку</small>
          </div>
          
          <div class="form-group">
            <label for="client-phone">📱 Телефон</label>
            <input type="tel" id="client-phone" name="phone" placeholder="+380501234567">
            <small class="form-hint">Контактний номер у форматі +380...</small>
          </div>
        </div>
        
        <div class="form-actions">
          <a href="clients.html" class="action-btn secondary">❌ Скасувати</a>
          <button type="submit" class="action-btn primary">💾 Зберегти клієнта</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
    });
  </script>
  <script src="expiring-safes.js"></script>
  <script src="add-client.js"></script>
  </div>
</body>
</html>
